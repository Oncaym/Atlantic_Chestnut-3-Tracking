<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>SF01 — Interactive Elevation</title><style>
:root{--bg:#0f1419;--panel:#1a2028;--border:#2d3744;--text:#e6edf3;--dim:#8b949e;--accent:#4493f8;--green:#3fb950;--red:#f85149;--orange:#ff8c42}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}
header{padding:14px 22px;border-bottom:1px solid var(--border)}h1{font-size:18px;margin:0}.sub{font-size:12px;color:var(--dim)}
.wrap{padding:14px 22px}
.bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.btn{background:var(--panel);border:1px solid var(--border);color:var(--text);border-radius:7px;padding:6px 12px;font-size:13px;cursor:pointer}
.btn.on{border-color:var(--accent);color:var(--accent)}
.hint{font-size:12px;color:var(--dim)}
.legend{display:flex;gap:14px;flex-wrap:wrap;margin:6px 0 12px;font-size:12px;color:var(--dim);align-items:center}
.dot{width:11px;height:11px;border-radius:3px;display:inline-block;border:1px solid var(--border);vertical-align:-1px;margin-right:5px}
.kpis{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}.kpi{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:8px 14px;font-size:12px;color:var(--dim)}.kpi b{display:block;font-size:20px;color:var(--text)}
.stage{background:#0b0e12;border:1px solid var(--border);border-radius:10px;padding:10px}svg{width:100%;height:auto;display:block}
.scope{fill:transparent;stroke-width:1.1;cursor:pointer;stroke:transparent}
.scope[data-type="glass"]{stroke:#3a6ea5} .scope[data-type="panel"]{stroke:#8b949e} .scope[data-type="door"]{stroke:var(--orange)} .scope[data-type="hidden"]{stroke:transparent;pointer-events:none;opacity:0}
.scope[data-status="installed"]{fill:rgba(63,185,80,.45)} .scope[data-status="issue"]{fill:rgba(248,81,73,.5)}
.scope:hover{stroke:#fff;stroke-width:1.6;fill:rgba(255,255,255,.10)}
.edit .scope[data-type="glass"]{fill:rgba(68,147,248,.14)} .edit .scope[data-type="panel"]{fill:rgba(139,148,158,.18)} .edit .scope[data-type="door"]{fill:rgba(255,140,66,.14)}
#tip{position:fixed;pointer-events:none;background:#000e;border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:12px;display:none;z-index:9}#tip b{color:var(--accent)}
</style></head><body>
<header><h1>SF01 — Interactive Elevation</h1>
<div class="sub">275 Chestnut Street · Residential Lobby · from SF01.dxf</div></header>
<div class="wrap">
<div class="bar">

  <button class="btn" id="mType">✎ Edit layout (reclassify / draw)</button>
  <span class="hint" id="hint">Click an element → cycle Pending → Installed → Issue</span>
  <span style="margin-left:auto"></span>
  <button class="btn" id="reset" title="Clear all edits">↻ Reset edits</button>
</div>
<div class="legend">
<span><span class="dot" style="background:#3a6ea5"></span>Glass</span>

<span><span class="dot" style="background:var(--orange)"></span>Door</span>

<span><span class="dot" style="background:var(--dim)"></span>Pending</span>
<span><span class="dot" style="background:var(--green)"></span>Installed</span>
<span><span class="dot" style="background:var(--red)"></span>Issue</span></div>

function statOf(el){return S.status[el.dataset.id]||'pending'}
function renderCustom(){
  custom.innerHTML=S.custom.map(c=>`<rect x="${c.x}" y="${c.y}" width="${c.w}" height="${c.h}" class="scope" data-id="${c.id}" data-t0="${c.type}" tabindex="0"/>`).join('');
  bind(custom.querySelectorAll('.scope'));
}
function paint(){
  document.querySelectorAll('.scope').forEach(el=>{el.dataset.type=typeOf(el);el.dataset.status=statOf(el);});
  const els=[...document.querySelectorAll('.scope')].filter(e=>e.dataset.type!=='hidden');
  const c=t=>{const a=els.filter(e=>e.dataset.type===t);return a.filter(e=>e.dataset.status==='installed').length+' / '+a.length};
  document.getElementById('kpis').innerHTML='<div class="kpi">Glass<b>'+c('glass')+'</b></div><div class="kpi">Metal panel<b>'+c('panel')+'</b></div><div class="kpi">Door<b>'+c('door')+'</b></div><div class="kpi">Issues<b>'+els.filter(e=>e.dataset.status==='issue').length+'</b></div>';
}
function bind(list){list.forEach(el=>{
  el.onmousemove=e=>{tip.style.display='block';tip.style.left=(e.clientX+14)+'px';tip.style.top=(e.clientY+14)+'px';
    tip.innerHTML='<b>'+el.dataset.id+'</b> ('+typeOf(el)+')<br>Status: '+LB[statOf(el)]+(editMode?'<br><i>click = change type</i>':'');};
  el.onmouseleave=()=>tip.style.display='none';
  el.onclick=ev=>{ev.stopPropagation();
    if(editMode){S.type[el.dataset.id]=NEXT_TY[typeOf(el)];}
    else{if(typeOf(el)==='hidden')return;S.status[el.dataset.id]=NEXT_ST[statOf(el)];}
    save();paint();};
});}
bind(document.querySelectorAll('#hits .scope')); renderCustom(); paint();
const bS=document.getElementById('mStatus'),bT=document.getElementById('mType'),hint=document.getElementById('hint');
function setMode(edit){editMode=edit;bS.classList.toggle('on',!edit);bT.classList.toggle('on',edit);
  svg.parentElement.classList.toggle('edit',edit);
  hint.textContent=edit?'Click element → cycle type (Glass→Metal→Door→Hidden). Drag on empty area → draw a new glass element.':'Click an element → cycle Pending → Installed → Issue';}
bS.onclick=()=>setMode(false); bT.onclick=()=>setMode(true);
document.getElementById('reset').onclick=()=>{if(confirm('Clear all status + layout edits for SF01?')){S.status={};S.type={};S.custom=[];save();renderCustom();paint();}};
let draw=null;
function pt(e){const p=svg.createSVGPoint();p.x=e.clientX;p.y=e.clientY;const q=p.matrixTransform(svg.getScreenCTM().inverse());return q;}
svg.addEventListener('mousedown',e=>{if(!editMode||e.target.classList.contains('scope'))return;const q=pt(e);draw={x:q.x,y:q.y};});
svg.addEventListener('mousemove',e=>{if(!draw)return;const q=pt(e);const x=Math.min(draw.x,q.x),y=Math.min(draw.y,q.y),w=Math.abs(q.x-draw.x),h=Math.abs(q.y-draw.y);
  let t=custom.querySelector('#tmp');if(!t){t=document.createElementNS('http://www.w3.org/2000/svg','rect');t.id='tmp';t.setAttribute('fill','rgba(68,147,248,.2)');t.setAttribute('stroke','#4493f8');custom.appendChild(t);}
  t.setAttribute('x',x);t.setAttribute('y',y);t.setAttribute('width',w);t.setAttribute('height',h);});
window.addEventListener('mouseup',e=>{if(!draw)return;const t=custom.querySelector('#tmp');const q=pt(e);const w=Math.abs(q.x-draw.x),h=Math.abs(q.y-draw.y);
  if(t)t.remove();
  if(w>2&&h>2){const id='C'+(S.custom.length+1);S.custom.push({id,type:'glass',x:+Math.min(draw.x,q.x).toFixed(1),y:+Math.min(draw.y,q.y).toFixed(1),w:+w.toFixed(1),h:+h.toFixed(1)});save();renderCustom();paint();}
  draw=null;});
</script></body></html>
